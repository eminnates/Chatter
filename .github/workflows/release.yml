name: Release Pipeline

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (örn: 1.7.0)"
        required: true
        type: string
      release_notes:
        description: "Release notları (opsiyonel)"
        required: false
        type: string

permissions:
  contents: write

jobs:
  build-linux-android-web:
    name: Build Linux + Android + Web + API
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: src/Chatter.UI/package-lock.json

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux dependencies for Tauri
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Inject version into project files
        env:
          VERSION: ${{ inputs.version }}
        run: |
          python3 - <<'PY'
          import json
          import os
          import pathlib
          import re

          version = os.environ["VERSION"]

          package_json = pathlib.Path("src/Chatter.UI/package.json")
          tauri_conf = pathlib.Path("src/Chatter.UI/src-tauri/tauri.conf.json")
          cargo_toml = pathlib.Path("src/Chatter.UI/src-tauri/Cargo.toml")
          gradle_file = pathlib.Path("src/Chatter.UI/android/app/build.gradle")

          data = json.loads(package_json.read_text(encoding="utf-8"))
          data["version"] = version
          package_json.write_text(json.dumps(data, indent=2, ensure_ascii=False) + "\n", encoding="utf-8")

          data = json.loads(tauri_conf.read_text(encoding="utf-8"))
          data["version"] = version
          tauri_conf.write_text(json.dumps(data, indent=2, ensure_ascii=False) + "\n", encoding="utf-8")

          cargo_text = cargo_toml.read_text(encoding="utf-8")
          cargo_text = re.sub(r'(?m)^version = ".*"$', f'version = "{version}"', cargo_text, count=1)
          cargo_toml.write_text(cargo_text, encoding="utf-8")

            if gradle_file.exists():
              gradle_text = gradle_file.read_text(encoding="utf-8")
              gradle_text = re.sub(r'(?m)^\s*versionName\s+".*"\s*$', f'        versionName "{version}"', gradle_text, count=1)
              gradle_file.write_text(gradle_text, encoding="utf-8")

          print(f"Version updated to {version}")
          PY

      - name: Build API publish package
        run: |
          mkdir -p release-assets
          dotnet restore Chatter/Chatter.sln
          dotnet build Chatter/Chatter.sln -c Release --no-restore
          dotnet publish src/Chatter.API/Chatter.API.csproj -c Release -o release-api
          tar -czf "release-assets/Chatter_API_${{ inputs.version }}_linux-x64.tar.gz" -C release-api .

      - name: Build Web package
        working-directory: src/Chatter.UI
        run: |
          npm ci
          npm run build
          mkdir -p ../../release-assets
          tar -czf "../../release-assets/Chatter_${{ inputs.version }}_Web.tar.gz" -C dist .

      - name: Build Linux desktop package (Tauri)
        working-directory: src/Chatter.UI
        run: |
          npm run tauri:build
          APPIMAGE=$(find src-tauri/target/release/bundle/appimage -maxdepth 1 -name '*.AppImage' | head -n 1)
          DEB=$(find src-tauri/target/release/bundle/deb -maxdepth 2 -name '*.deb' | head -n 1)

          if [ -n "$APPIMAGE" ]; then
            cp "$APPIMAGE" "../../release-assets/Chatter_${{ inputs.version }}_amd64.AppImage"
          fi

          if [ -n "$DEB" ]; then
            cp "$DEB" "../../release-assets/Chatter_${{ inputs.version }}_amd64.deb"
          fi

      - name: Build Android APK
        working-directory: src/Chatter.UI
        run: |
          if [ ! -d android ]; then
            npx cap add android
          fi
          npm run android:build
          APK=$(find android/app/build/outputs/apk/release -maxdepth 1 -name '*.apk' | head -n 1)
          if [ -z "$APK" ]; then
            echo "APK dosyası bulunamadı"
            exit 1
          fi
          cp "$APK" "../../release-assets/Chatter_${{ inputs.version }}_Android.apk"

      - name: Upload Linux/Android/Web artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-assets-linux
          path: release-assets/*
          if-no-files-found: error

  build-windows-desktop:
    name: Build Windows Desktop
    runs-on: windows-latest
    needs: build-linux-android-web

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: src/Chatter.UI/package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Inject version into project files
        shell: pwsh
        env:
          VERSION: ${{ inputs.version }}
        run: |
          $script = @'
          import json
          import os
          import pathlib
          import re

          version = os.environ["VERSION"]

          package_json = pathlib.Path("src/Chatter.UI/package.json")
          tauri_conf = pathlib.Path("src/Chatter.UI/src-tauri/tauri.conf.json")
          cargo_toml = pathlib.Path("src/Chatter.UI/src-tauri/Cargo.toml")
          gradle_file = pathlib.Path("src/Chatter.UI/android/app/build.gradle")

          data = json.loads(package_json.read_text(encoding="utf-8"))
          data["version"] = version
          package_json.write_text(json.dumps(data, indent=2, ensure_ascii=False) + "\n", encoding="utf-8")

          data = json.loads(tauri_conf.read_text(encoding="utf-8"))
          data["version"] = version
          tauri_conf.write_text(json.dumps(data, indent=2, ensure_ascii=False) + "\n", encoding="utf-8")

          cargo_text = cargo_toml.read_text(encoding="utf-8")
          cargo_text = re.sub(r'(?m)^version = ".*"$', f'version = "{version}"', cargo_text, count=1)
          cargo_toml.write_text(cargo_text, encoding="utf-8")

            if gradle_file.exists():
              gradle_text = gradle_file.read_text(encoding="utf-8")
              gradle_text = re.sub(r'(?m)^\s*versionName\s+".*"\s*$', f'        versionName "{version}"', gradle_text, count=1)
              gradle_file.write_text(gradle_text, encoding="utf-8")

          print(f"Version updated to {version}")
          '@

          Set-Content -Path update_version.py -Value $script
          python update_version.py

      - name: Build Windows desktop package (Tauri)
        working-directory: src/Chatter.UI
        shell: pwsh
        run: |
          npm ci
          npm run tauri:build
          New-Item -ItemType Directory -Force -Path ../../release-assets | Out-Null

          $exe = Get-ChildItem -Path src-tauri/target/release/bundle -Recurse -File |
            Where-Object { $_.Name -match 'setup.*\.exe$|.*x64.*\.exe$|.*\.exe$' } |
            Select-Object -First 1

          if (-not $exe) {
            Write-Error "Windows installer (.exe) bulunamadı"
            exit 1
          }

          Copy-Item $exe.FullName "../../release-assets/Chatter_${{ inputs.version }}_x64-setup.exe"

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-assets-windows
          path: release-assets/*
          if-no-files-found: error

  publish-release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs:
      - build-linux-android-web
      - build-windows-desktop

    steps:
      - name: Download Linux artifacts
        uses: actions/download-artifact@v4
        with:
          name: release-assets-linux
          path: release-assets

      - name: Download Windows artifacts
        uses: actions/download-artifact@v4
        with:
          name: release-assets-windows
          path: release-assets

      - name: Generate checksums
        run: |
          cd release-assets
          sha256sum * > SHA256SUMS.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ inputs.version }}
          name: Chatter v${{ inputs.version }}
          body: ${{ inputs.release_notes != '' && inputs.release_notes || format('Chatter {0} sürümü otomatik olarak üretildi.', inputs.version) }}
          files: |
            release-assets/*
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
